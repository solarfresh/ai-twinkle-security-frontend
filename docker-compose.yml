version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    # env_file:
    #   - ./docker-var.env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - twinkle_network

volumes:
  frontend_data:

networks:
  twinkle_network:
    name: twinkle-network
    external: true
